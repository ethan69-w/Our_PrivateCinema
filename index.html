<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Private Cinema ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#060606;
    color:white;
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
}

/* Background */

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.92)),
    url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1600&auto=format&fit=crop');
    background-size:cover;
    background-position:center;
    z-index:-3;
}

body::after{
    content:"";
    position:fixed;
    inset:0;
    backdrop-filter:blur(12px);
    z-index:-2;
}

/* Floating Lights */

.light{
    position:fixed;
    width:12px;
    height:12px;
    border-radius:50%;
    background:rgba(255,215,160,.7);
    box-shadow:0 0 30px rgba(255,215,160,.9);
    animation:float 10s linear infinite;
    z-index:-1;
}

@keyframes float{
    from{
        transform:translateY(100vh) scale(.5);
        opacity:0;
    }
    to{
        transform:translateY(-120px) scale(1.2);
        opacity:1;
    }
}

/* Header */

header{
    position:sticky;
    top:0;
    z-index:999;
    background:rgba(10,10,10,.35);
    backdrop-filter:blur(18px);
    border-bottom:1px solid rgba(255,255,255,.08);
}

.navbar{
    padding:22px 35px;
}

.logo{
    font-family:'Cormorant Garamond',serif;
    font-size:42px;
    font-weight:700;
    color:#ffd6a5;
}

/* Search */

.search-wrapper{
    display:flex;
    justify-content:center;
    padding:0 35px 22px;
}

.search-box{
    width:100%;
    max-width:700px;
}

.search-box input{
    width:100%;
    padding:15px 22px;
    border:none;
    border-radius:50px;
    background:rgba(255,255,255,.08);
    color:white;
    outline:none;
    font-size:15px;
}

/* Hero */

.hero{
    min-height:75vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:50px 20px;
}

.hero-content{
    max-width:900px;
}

.hero h1{
    font-family:'Cormorant Garamond',serif;
    font-size:90px;
    line-height:1;
    margin-bottom:20px;
    color:#fff4e6;
}

.hero h1 span{
    color:#ffd6a5;
}

.hero p{
    color:#dddddd;
    line-height:1.9;
    font-size:18px;
}

.hero button{
    margin-top:35px;
    padding:16px 40px;
    border:none;
    border-radius:60px;
    background:linear-gradient(135deg,#ffd6a5,#ff9f7f);
    color:#111;
    font-weight:700;
    cursor:pointer;
}

/* Note */

.note{
    width:92%;
    max-width:950px;
    margin:0 auto 70px;
    padding:35px;
    border-radius:35px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(16px);
    text-align:center;
    line-height:2;
}

.note h2{
    font-family:'Cormorant Garamond',serif;
    color:#ffd6a5;
    font-size:42px;
    margin-bottom:12px;
}

/* Buttons */

.top-actions{
    display:flex;
    gap:15px;
    padding:0 35px 25px;
    flex-wrap:wrap;
}

.fav-view-btn,
.category-btn{
    padding:12px 20px;
    border:none;
    border-radius:50px;
    background:rgba(255,255,255,.08);
    color:white;
    cursor:pointer;
    backdrop-filter:blur(10px);
}

/* Categories */

.categories{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    padding:0 35px 25px;
}

/* Section */

.section-title{
    padding:0 35px;
    margin-bottom:28px;
    font-family:'Cormorant Garamond',serif;
    font-size:42px;
    color:#ffe3c1;
}

/* Movie Grid */

.movie-grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:25px;
    padding:0 35px 60px;
}

.movie-card{
    position:relative;
    overflow:hidden;
    border-radius:28px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08);
    transition:.4s;
    cursor:pointer;
}

.movie-card:hover{
    transform:translateY(-10px);
}

.movie-card img{
    width:100%;
    height:320px;
    object-fit:cover;
    display:block;
}

.overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(to top,rgba(0,0,0,.95),transparent 60%);
    opacity:0;
    transition:.3s;
    display:flex;
    justify-content:center;
    align-items:center;
}

.movie-card:hover .overlay{
    opacity:1;
}

.play-btn{
    width:85px;
    height:85px;
    border-radius:50%;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(12px);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:32px;
}

/* Movie Info */

.movie-info{
    padding:20px;
}

.movie-info h3{
    font-size:18px;
    margin-bottom:6px;
}

.movie-info span{
    color:#d9d9d9;
    font-size:13px;
}

/* Favorite */

.favorite-btn{
    position:absolute;
    top:15px;
    right:15px;
    width:42px;
    height:42px;
    border-radius:50%;
    background:rgba(0,0,0,.5);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:10;
    font-size:18px;
}

.favorite-btn.active{
    background:#ff5a82;
}

/* Pagination */

.pagination{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    padding-bottom:60px;
}

.pagination button{
    padding:10px 20px;
    border:none;
    border-radius:50px;
    background:#ff7fa8;
    color:white;
    cursor:pointer;
}

/* VIDEO PLAYER FIXED FOR SAFARI */

#videoSection{
    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,.97);

    display:none;
    justify-content:center;
    align-items:center;

    padding:20px;

    z-index:2147483647;

    -webkit-backface-visibility:hidden;
    backface-visibility:hidden;

    transform:translateZ(0);

    -webkit-transform:translateZ(0);
}

.video-container{
    position:relative;

    width:100%;
    max-width:1100px;

    background:black;

    border-radius:25px;

    overflow:hidden;

    z-index:2147483647;

    transform:translateZ(0);

    -webkit-transform:translateZ(0);
}

#moviePlayer{
    width:100%;
    aspect-ratio:16/9;

    border:none;

    display:block;

    background:black;

    position:relative;

    z-index:2147483647;

    transform:translateZ(0);

    -webkit-transform:translateZ(0);
}

.close-video-btn{
    position:absolute;

    top:15px;
    right:15px;

    padding:10px 18px;

    border:none;
    border-radius:50px;

    background:rgba(0,0,0,.75);

    color:white;

    cursor:pointer;

    z-index:2147483647;
}

/* Footer */

footer{
    padding:50px 20px;
    text-align:center;
    color:#bdbdbd;
}

/* Mobile */

@media(max-width:768px){

.hero h1{
    font-size:52px;
}

.movie-grid{
    grid-template-columns:repeat(2,1fr);
    gap:16px;
    padding:0 16px 40px;
}

.movie-card img{
    height:240px;
}

.section-title{
    padding:0 18px;
    font-size:34px;
}

.navbar{
    padding:18px;
}

.categories{
    padding:0 18px 20px;
}

.top-actions{
    padding:0 18px 20px;
}

#videoSection{
    padding:10px;
}

.video-container{
    border-radius:18px;
}

.close-video-btn{
    top:10px;
    right:10px;

    padding:8px 14px;

    font-size:13px;
}

}

</style>
</head>

<body>

<div class="light" style="left:10%;animation-delay:0s"></div>
<div class="light" style="left:28%;animation-delay:2s"></div>
<div class="light" style="left:46%;animation-delay:5s"></div>
<div class="light" style="left:66%;animation-delay:1s"></div>
<div class="light" style="left:86%;animation-delay:4s"></div>

<header>

<div class="navbar">
<div class="logo">Our Private Cinema ❤️</div>
</div>

<div class="search-wrapper">
<div class="search-box">
<input
type="text"
id="searchBar"
placeholder="Search our favorite movie..."
onkeyup="searchMovies()">
</div>
</div>

</header>

<section class="hero">

<div class="hero-content">

<h1>
A Little <span>World</span><br>
Made For You
</h1>

<p>
ဒီ website လေးက Ri Ri အတွက် ❤️
</p>

<button onclick="window.scrollTo({top:900,behavior:'smooth'})">
Enter Our Cinema 🎬
</button>

</div>

</section>

<div class="note">

<h2>To My Favorite Person ❤️</h2>

တစ်န့ကျရင် ကိုယ်တို့နှစ်ယောက်အတူ<br>ဒီထဲက ဇာတ်ကားလေးတွေကို အတူကြည့်<br>နိုင်အောင် ကြိုးစားကြမယ် ❤️

</div>

<div class="top-actions">
<button class="fav-view-btn" onclick="showFavorites()">❤️ Favorites</button>
<button class="fav-view-btn" onclick="showAllMovies()">🎬 All Movies</button>
</div>

<h2 class="section-title">✨ Movies For You</h2>

<div id="categories" class="categories"></div>

<div id="movie-list" class="movie-grid">
Loading Movies...
</div>

<div id="pagination" class="pagination"></div>

<!-- VIDEO -->

<div id="videoSection">

<div class="video-container">

<button class="close-video-btn" onclick="closeVideo()">
✕ Close
</button>

<iframe
id="moviePlayer"
allowfullscreen
allow="autoplay; fullscreen">
</iframe>

</div>

</div>

<footer>
Made With Love ❤️
</footer>

<script>

const blogUrl = "naing60.blogspot.com";

let allMovies = [];
let currentPage = 1;

const moviesPerPage = 10;

let currentCategory = "All";

/* Fetch Movies */

function fetchMovies(){

    const script = document.createElement('script');

    script.src =
    `https://${blogUrl}/feeds/posts/default?alt=json-in-script&callback=processData&max-results=500`;

    document.body.appendChild(script);
}

/* Process Data */

function processData(data){

    const entries = data.feed.entry || [];

    allMovies = entries.map(entry => {

        const title = entry.title.$t;

        const content = entry.content.$t;

        const imgUrl =
        entry.media$thumbnail
        ? entry.media$thumbnail.url.replace('s72-c','s1600')
        : 'https://via.placeholder.com/300x450';

        const regex =
        /https:\/\/drive\.google\.com\/file\/d\/[^\"]+\/preview/g;

        const match = content.match(regex);

        const videoUrl = match ? match[0] : '';

        const labels =
        entry.category
        ? entry.category.map(cat => cat.term)
        : [];

        return {
            title,
            imgUrl,
            videoUrl,
            labels
        };

    });

    createCategoryButtons();

    renderMovies();
}

/* Render Movies */

function renderMovies(){

    let filteredMovies = allMovies;

    if(currentCategory !== "All"){

        filteredMovies = allMovies.filter(movie =>
            movie.labels.includes(currentCategory)
        );
    }

    const start =
    (currentPage - 1) * moviesPerPage;

    const end =
    start + moviesPerPage;

    const moviesToShow =
    filteredMovies.slice(start,end);

    let html = "";

    moviesToShow.forEach(movie => {

        html += `

        <div class="movie-card"
        onclick="openVideo('${movie.videoUrl}')">

            <div class="favorite-btn"
            onclick="toggleFavorite(event,this)">
            ♡
            </div>

            <img src="${movie.imgUrl}">

            <div class="overlay">
                <div class="play-btn">▶</div>
            </div>

            <div class="movie-info">
                <h3>${movie.title}</h3>
                <span>Watch Together ❤️</span>
            </div>

        </div>

        `;
    });

    document.getElementById("movie-list").innerHTML = html;

    renderPagination(filteredMovies.length);

    loadFavorites();
}

/* Pagination */

function renderPagination(totalMovies){

    const totalPages =
    Math.ceil(totalMovies / moviesPerPage);

    let html = "";

    if(currentPage > 1){

        html += `
        <button onclick="changePage(${currentPage - 1})">
        ← Prev
        </button>
        `;
    }

    html += `
    <span>Page ${currentPage} / ${totalPages}</span>
    `;

    if(currentPage < totalPages){

        html += `
        <button onclick="changePage(${currentPage + 1})">
        Next →
        </button>
        `;
    }

    document.getElementById("pagination").innerHTML = html;
}

function changePage(page){

    currentPage = page;

    renderMovies();

    window.scrollTo({
        top:850,
        behavior:"smooth"
    });
}

/* Categories */

function createCategoryButtons(){

    let categories = ["All"];

    allMovies.forEach(movie => {

        movie.labels.forEach(label => {

            if(!categories.includes(label)){
                categories.push(label);
            }

        });

    });

    let html = "";

    categories.forEach(cat => {

        html += `
        <button class="category-btn"
        onclick="filterCategory('${cat}')">
        ${cat}
        </button>
        `;
    });

    document.getElementById("categories").innerHTML = html;
}

function filterCategory(category){

    currentCategory = category;

    currentPage = 1;

    renderMovies();
}

/* OPEN VIDEO */

function openVideo(url){

    if(!url){

        alert("It's Locked ❤️\n\nဤရုပ်ရှင်အား ကြည့်ရှုနိုင်ရန်\nသင့်ကောင်လေးအား အာဘွားပေး၍\nUnlock လုပ်ပါ...");

        return;
    }

    const player =
    document.getElementById("moviePlayer");

    document.getElementById("videoSection")
    .style.display = "flex";

    setTimeout(() => {

        player.src = url;

    },100);
}

/* CLOSE VIDEO */

function closeVideo(){

    document.getElementById("videoSection")
    .style.display = "none";

    document.getElementById("moviePlayer")
    .src = "";

}

/* Search */

function searchMovies(){

    const input =
    document.getElementById("searchBar")
    .value
    .toLowerCase();

    const cards =
    document.querySelectorAll(".movie-card");

    cards.forEach(card => {

        const title =
        card.querySelector("h3")
        .innerText
        .toLowerCase();

        if(title.includes(input)){
            card.style.display = "";
        }else{
            card.style.display = "none";
        }

    });
}

/* Favorites */

function toggleFavorite(event,btn){

    event.stopPropagation();

    btn.classList.toggle("active");

    const card = btn.closest(".movie-card");

    const title =
    card.querySelector("h3").innerText;

    let favorites =
    JSON.parse(localStorage.getItem("favorites"))
    || [];

    if(btn.classList.contains("active")){

        btn.innerHTML = "❤";

        if(!favorites.includes(title)){
            favorites.push(title);
        }

    }else{

        btn.innerHTML = "♡";

        favorites =
        favorites.filter(fav => fav !== title);
    }

    localStorage.setItem(
        "favorites",
        JSON.stringify(favorites)
    );
}

function loadFavorites(){

    const favorites =
    JSON.parse(localStorage.getItem("favorites"))
    || [];

    const cards =
    document.querySelectorAll(".movie-card");

    cards.forEach(card => {

        const title =
        card.querySelector("h3").innerText;

        const btn =
        card.querySelector(".favorite-btn");

        if(favorites.includes(title)){

            btn.classList.add("active");

            btn.innerHTML = "❤";
        }

    });
}

function showFavorites(){

    const favorites =
    JSON.parse(localStorage.getItem("favorites"))
    || [];

    const cards =
    document.querySelectorAll(".movie-card");

    cards.forEach(card => {

        const title =
        card.querySelector("h3").innerText;

        if(favorites.includes(title)){
            card.style.display = "";
        }else{
            card.style.display = "none";
        }

    });
}

function showAllMovies(){

    renderMovies();
}

window.onload = fetchMovies;

</script>

</body>
</html>
